{% extends "base.html" %}
{% block content %}
<section class="intro">
  <p>{{ site.description }}</p>
</section>
<hr>
<h2 class="section-label">Writing</h2>
<ul class="post-list">
  {% for post in posts %}
  <li>
    <time datetime="{{ post.date }}">{{ post.date_display }}</time>
    <a href="/posts/{{ post.slug }}/">{{ post.title }}</a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
